<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farewell Surprise</title>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Segoe UI, sans-serif;
    color:white;
}

#intro{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:black;
}

h1{
    font-size:55px;
    margin-bottom:20px;
}

p{
    font-size:25px;
    margin-bottom:35px;
    color:#ddd;
}

button{
    padding:18px 45px;
    font-size:22px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:#ff4081;
    color:white;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#flash{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
}

#imageContainer{
    display:none;
    width:100%;
    height:100vh;
    justify-content:center;
    align-items:center;
    background:black;
}

#farewellImage{
    max-width:95vw;
    max-height:95vh;
    width:auto;
    height:auto;
    object-fit:contain;
    border-radius:15px;
    box-shadow:0 0 40px rgba(255,255,255,.6);
    transform:scale(.2);
    opacity:0;
    transition:all 1.4s ease;
}
</style>

</head>

<body>

<div id="intro">
    <h1>🎬 QA Team Presents</h1>

    <p>
        Every journey has a beautiful ending...<br><br>
        But every ending leaves behind unforgettable memories ❤️
    </p>

    <button onclick="showSurprise()">🎁 Reveal the Surprise</button>
</div>

<div id="flash"></div>

<div id="imageContainer">
    <img id="farewellImage" src="farewell.png" alt="Farewell Image">
</div>

<script>

function fireworks(){

    if(typeof confetti === "undefined"){
        return;
    }

    confetti({
        particleCount:180,
        spread:180,
        origin:{y:0.6}
    });

    setTimeout(()=>{
        confetti({
            particleCount:150,
            angle:60,
            spread:100,
            origin:{x:0}
        });
    },300);

    setTimeout(()=>{
        confetti({
            particleCount:150,
            angle:120,
            spread:100,
            origin:{x:1}
        });
    },500);

}

function flash(){

    let f=document.getElementById("flash");

    f.style.transition="0.4s";
    f.style.opacity="1";

    setTimeout(()=>{
        f.style.opacity="0";
    },400);

}

function showSurprise(){

    document.getElementById("intro").style.display="none";

    flash();

    fireworks();

    document.getElementById("imageContainer").style.display="flex";

    setTimeout(()=>{

        let img=document.getElementById("farewellImage");

        img.style.opacity="1";
        img.style.transform="scale(1)";

    },300);

}

</script>

</body>
</html>
